<!DOCTYPE html>
<html>
<head>
<title>Book Availability</title>

<style>

body{

}

.container{

border:2px solid black;
padding:15px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{

}

.button{
background:#5b8ec5;
color:white;

padding:10px 30px;

}

<td>

</select>
</td>

<td></td>
</tr>

<td>Return book?</td>

<td>
<select>
<option>Drop Down</option>
<option>Author 1</option>

</td>

</tr>

</html>
