<!DOCTYPE html>
<html>
<head>
<title>Transactions - Pay Fine</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
}

.container{
width:900px;
margin:auto;
border:1px solid black;
}

.header{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid black;
font-weight:bold;
}

.main{
display:flex;
}

.sidebar{
width:200px;
border-right:1px solid black;
}

.sidebar div{
padding:10px;
border-bottom:1px solid #ccc;
cursor:pointer;
}

.content{
flex:1;
padding:15px;
}

h3{
margin-top:0;
}

table{
width:100%;
border-collapse:collapse;
}

td{
padding:8px;
border-bottom:1px solid #ddd;
}

input[type="text"],
input[type="number"],
input[type="date"],
textarea{
width:95%;
padding:6px;
}

textarea{
height:60px;
}

.buttons{
margin-top:20px;
display:flex;
justify-content:space-between;
}

button{
padding:10px 45px;
border:none;
border-radius:25px;
background:linear-gradient(#74b9ff,#2e86de);
color:white;
font-size:16px;
cursor:pointer;
}

.logout{
text-align:right;
padding:10px;
}

</style>

</head>
<body>
<div class="container">
<div class="header">
<div>Transactions</div>
<div>Home</div>
</div>

<div class="main">

<div class="sidebar">

<div>Is book available?</div>
<div>Issue book?</div>
<div>Return book?</div>
<div><b>Pay Fine?</b></div>

</div>

<div class="content">

<h3>Pay Fine</h3>

<table>

<tr>
<td>Enter Book Name</td>
<td><input type="text"></td>
</tr>

<tr>
<td>Enter Author</td>
<td><input type="text"></td>
</tr>

<tr>
<td>Serial No</td>
<td><input type="text"></td>
</tr>

<tr>
<td>Issue Date</td>
<td><input type="date"></td>
</tr>

<tr>
<td>Return Date</td>
<td><input type="date"></td>
</tr>

<tr>
<td>Actual Return Date</td>
<td><input type="date"></td>
</tr>

<tr>
<td>Fine Calculated</td>
<td><input type="number" value="0"></td>
</tr>

<tr>
<td>Fine Paid</td>
<td><input type="checkbox"></td>
</tr>

<tr>
<td>Remarks</td>
<td><textarea placeholder="Optional"></textarea></td>
</tr>

</table>

<div class="buttons">

<button>Cancel</button>
<button>Confirm</button>

</div>
</div>
</div>
<div class="logout">
Log Out
</div>
</div>
</body>
</html>
