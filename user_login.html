<!DOCTYPE html>
<html>
<head>
<title>Library Management System - Admin Login</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
}

.container{
    width:420px;
    margin:100px auto;
    border:2px solid #000;
    padding:30px;
    background:white;
}

h2{
    text-align:center;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:10px;
    font-weight:bold;
}

input{
    width:100%;
    padding:8px;
    margin-top:5px;
    border:2px solid #000;
}

.buttons{
    margin-top:20px;
    text-align:center;
}

button{
    padding:10px 25px;
    margin:5px;
    border:none;
    background:#4da3ff;
    color:white;
    font-size:14px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#2c80d3;
}

.back{
    float:right;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">
<h2>Library Management System</h2>

<form>

<label>User ID</label>
<input type="text" placeholder="Enter User ID" value="user">

<label>Password</label>
<input type="password" placeholder="Enter Password" value="user">

<div class="buttons">
<button type="reset">Cancel</button>
<button type="submit">Login</button>
</div>
</form>
</div>
</body>
</html>
